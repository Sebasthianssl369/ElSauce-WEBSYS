<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
    <!--CSS-->
  <link rel="stylesheet" th:href="@{css/styles.css}">

    <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link type="image/png" th:href="@{/imgs/logo_el_sauce.png}">

    <script th:src="@{/scripts/scripts.js}"></script>
    
  <style>
    .gradient-custom-3 {
      background: linear-gradient(to right, rgba(132, 250, 176, 0.4), rgba(143, 211, 244, 0.4));
    }
  </style>
</head>
<body>
  <div th:replace="Fragmentos/fragmentos :: header"></div>
    <section class="vh-100 gradient-custom-3 d-flex align-items-center">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card shadow" style="border-radius: 15px;">
          <div class="card-body p-5">
            <h2 class="text-uppercase text-center mb-5">Inicia sesión</h2>

            <form id="formLogin" th:action="@{/auth/login}" method="post" novalidate>
              <div th:replace="Fragmentos/fragmentos :: alertas"></div>

              <div class="form-outline mb-4">
                <input type="email" id="correoLogin" name="email" class="form-control form-control-lg" required />
                <label class="form-label" for="correoLogin">Correo electrónico</label>
              </div>

              <div class="form-outline mb-4">
                <input type="password" id="passwordLogin" name="password" class="form-control form-control-lg" required />
                <label class="form-label" for="passwordLogin">Contraseña</label>
              </div>

              <div class="d-flex justify-content-center mb-4">
                <button type="submit" class="btn btn-success btn-lg w-100">
                  Continuar
                </button>
              </div>

              <p class="text-center text-muted mt-5 mb-0">
                ¿No tienes cuenta?
                <a th:href="@{registro}" class="fw-bold text-body"><u>Regístrate</u></a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

</body>
</html>
