<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
    <!--CSS-->
  <link rel="stylesheet" th:href="@{css/styles.css}">

    <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link type="image/png" th:href="@{/imgs/logo_el_sauce.png}">

    <script th:src="@{/scripts/scripts.js}"></script>
    
  <style>
    .gradient-custom-3 {
      background: linear-gradient(to right, rgba(132, 250, 176, 0.4), rgba(143, 211, 244, 0.4));
    }
  </style>
</head>
<body>
  <div th:replace="Fragmentos/fragmentos :: header"></div>
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Inicia sesión</h2>
    <form id="formLogin" th:action="@{/login}" method="post">
        <div th:replace="Fragmentos/fragmentos :: alertas"></div>
        <label for="correo">Correo:</label>
        <input type="email" id="correoLogin" name="email" required><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="passwordLogin" name="password" required><br>

        <button class="btn-submit" type="submit" >Continuar</button>
        
    </form>
    <a class="btnModal" th:href="@{/registro}">¿No tienes cuenta? Regístrate</button>
  </div>

</body>
</html>
