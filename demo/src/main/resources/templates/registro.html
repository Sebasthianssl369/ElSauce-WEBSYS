<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
     <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
    <!--CSS-->
  <link rel="stylesheet" th:href="@{css/styles.css}">

    <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link type="image/png" th:href="@{/imgs/logo_el_sauce.png}">

    <script th:src="@{/scripts/scripts.js}"></script>
    
</head>
<body>
    <div th:replace="Fragmentos/fragmentos :: header"></div>
    <section class="vh-100 bg-image" 
  style="background-image: url('https://mdbcdn.b-cdn.net/img/Photos/new-templates/search-box/img4.webp');">
  <div class="mask d-flex align-items-center h-100 gradient-custom-3">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card" style="border-radius: 15px;">
            <div class="card-body p-5">
              <h2 class="text-uppercase text-center mb-5">Regístrate con nosotros</h2>

              <!-- Formulario original con diseño integrado -->
              <form id="formReserva" th:action="@{/auth/register}" method="post" novalidate>

                <!-- Fragmento de alertas -->
                <div th:replace="Fragmentos/fragmentos :: alertas"></div>

                <div class="form-outline mb-4">
                  <input type="text" id="nombre" name="nombre" class="form-control form-control-lg" required />
                  <label class="form-label" for="nombre">Nombre</label>
                </div>

                <div class="form-outline mb-4">
                  <input type="text" id="apellido" name="apellido" class="form-control form-control-lg" required />
                  <label class="form-label" for="apellido">Apellido</label>
                </div>

                <div class="form-outline mb-4">
                  <input type="email" id="correoRegistro" name="email" class="form-control form-control-lg" required />
                  <label class="form-label" for="correoRegistro">Correo</label>
                </div>

                <div class="form-outline mb-4">
                  <input type="password" id="passwordRegistro" name="password" class="form-control form-control-lg" required />
                  <label class="form-label" for="passwordRegistro">Contraseña</label>
                </div>

                <div class="form-outline mb-4">
                  <input type="tel" id="telefono" name="telefono" class="form-control form-control-lg" required />
                  <label class="form-label" for="telefono">Teléfono</label>
                </div>

                <div class="form-check d-flex justify-content-center mb-5">
                  <input class="form-check-input me-2" type="checkbox" id="terminos" required />
                  <label class="form-check-label" for="terminos">
                    Acepto los <a href="#!" class="text-body"><u>Términos y condiciones</u></a>
                  </label>
                </div>

                <div class="d-flex justify-content-center">
                  <button type="submit" class="btn btn-success btn-block btn-lg gradient-custom-4 text-body">
                    Continuar
                  </button>
                </div>

                <p class="text-center text-muted mt-5 mb-0">
                  ¿Ya tienes cuenta? 
                  <a th:href="@{login}" class="fw-bold text-body"><u>Inicia sesión</u></a>
                </p>

              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

</body>
</html>
