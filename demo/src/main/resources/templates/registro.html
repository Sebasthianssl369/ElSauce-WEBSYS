<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
     <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
    <!--CSS-->
  <link rel="stylesheet" th:href="@{css/styles.css}">

    <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link type="image/png" th:href="@{/imgs/logo_el_sauce.png}">

    <script th:src="@{/scripts/scripts.js}"></script>
    
</head>
<body>
    <div th:replace="Fragmentos/fragmentos :: header"></div>
    <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Registrate con nosotros</h2>
    <form id="formReserva" th:action="@{/auth/register}" method="post" novalidate>
        <div th:replace="Fragmentos/fragmentos :: alertas"></div>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required><br>

        <label for="correo">Correo:</label>
        <input type="email" id="correoRegistro" name="email" required><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="passwordRegistro" name="password" required><br>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required><br>

       <button class="btn-submit" type="submit" >Continuar</button>
        
    </form>
    <a th:href="@{/login}" class="btnModal" >¿Ya tienes cuenta? Inicia sesión</button>
  </div>

</body>
</html>
