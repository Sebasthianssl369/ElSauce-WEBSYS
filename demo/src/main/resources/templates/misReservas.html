<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- CSS -->
        <link rel="stylesheet" th:href="@{/css/styles.css}">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <link type="image/png" th:href="@{/imgs/logo_el_sauce.png}">
</head>
<body class="p-4">
<div th:replace="~{Fragmentos/fragmentos :: header}"></div>
<h2>Últimas Reservas</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Id</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Zona</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="reserva : ${futurasReservas}">
            <td th:text="${reserva.id}">1</td>
            <td th:text="${reserva.fechaReserva}">2025-11-24</td>
            <td th:text="${reserva.horaReserva}">18:30</td>
            <td th:text="${reserva.zona.nombre}">Zona A</td>
            <td>
                <td>
    <a th:href="@{/reserva/pdf(id=${reserva.id})}" class="btn btn-outline-primary btn-sm" title="Descargar PDF">
        <i class="fa-solid fa-download"></i>⬇
    </a>
</td>

            </td>
        </tr>
    </tbody>
</table>

<h2>Reservas Anteriores</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Id</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Zona</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="reserva : ${reservasAnteriores}">
            <td th:text="${reserva.id}">1</td>
            <td th:text="${reserva.fechaReserva}">2025-11-20</td>
            <td th:text="${reserva.horaReserva}">20:00</td>
            <td th:text="${reserva.zona.nombre}">Zona B</td>
            <td>
                <a th:href="@{/reserva/pdf(id=${reserva.id})}" class="btn btn-outline-primary btn-sm">
                    <i class="fa-solid fa-download"></i>⬇
                </a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
