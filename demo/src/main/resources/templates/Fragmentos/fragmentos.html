<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<!-- =============================== -->
<!-- HEAD GENERAL (para index, etc.) -->
<!-- =============================== -->
<head th:fragment="head">
    <meta charset="UTF-8">
    <title>Restaurante El Sauce</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link type="image/png" th:href="@{/imgs/logo_el_sauce.png}">


</head>

<!-- =============================== -->
<!-- HEAD LOGIN (solo para login) -->
<!-- =============================== -->
<head th:fragment="headLogin">
    
        <meta charset="UTF-8">
        <title>Login</title>

        <!-- Bootstrap 5.3.3 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- CSS -->
        <link rel="stylesheet" th:href="@{/css/styles.css}">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <link type="image/png" th:href="@{/imgs/logo_el_sauce.png}">

        <!-- Script -->
        <script th:src="@{/scripts/scripts.js}"></script>

        <style>
            .gradient-custom-3 {
                background: linear-gradient(to right, rgba(132, 250, 176, 0.4), rgba(143, 211, 244, 0.4));
            }
        </style>
  </head>


<body>

<!-- ALERTAS -->
<div th:fragment="alertas">
    <div th:if="${mensaje}" class="alert alert-success"
         style="background:#d4edda;color:#155724;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;">
        <span th:text="${mensaje}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger"
         style="background:#f8d7da;color:#721c24;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;">
        <span th:text="${error}"></span>
    </div>
</div>



<!-- HEADER -->
<div th:fragment="header" class="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" th:href="@{/index}">
                <img th:src="@{/imgs/logo_el_sauce.png}" alt="El Sauce" class="logo"/>
            </a>

            <!-- BOTÓN MÓVIL -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- CONTENIDO -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item"><a class="nav-link" th:href="@{/index}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/nosotros}">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/index#nuestra-carta}">Carta del día</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/index#recorrido}">Recorrido</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/index#promociones}">Promociones</a></li>

                    <li class="nav-item"><a class="nav-link" th:href="@{/galeria}">Galería</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/eventos}">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/noticias}">Noticias</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/index#mas_informacion}">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/index#contacto}">Síguenos</a></li>

                </ul>

                <!-- Usuario no logueado -->
                <div th:if="${usuarioLogeado == null}">
                    <a th:href="@{/login}" class="btn-tour">Inicia sesión</a>
                </div>

                <!-- Usuario logueado -->
                <div th:if="${usuarioLogeado != null}" class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle" id="userMenu"
                            data-bs-toggle="dropdown">
                        <i class="fa-solid fa-user me-1"></i>
                        <span th:text="${usuarioLogeado.nombre}">Usuario</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                        <li><a class="dropdown-item" th:href="@{/perfil}">
                            <i class="fa-solid fa-id-card me-1"></i> Mis Reservas
                        </a></li>

                        <li><hr class="dropdown-divider"></li>

                        <li><a class="dropdown-item text-danger" th:href="@{/auth/logout}">
                            <i class="fa-solid fa-right-from-bracket me-1"></i> Cerrar sesión
                        </a></li>
                    </ul>
                </div>

            </div>
        </div>
    </nav>
</div>
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:src="@{/scripts/scripts.js}"></script>
    <script th:src="@{/scripts/carta.js}"></script>
</div>
</body>
</html>
